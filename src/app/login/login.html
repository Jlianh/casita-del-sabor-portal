<div class="login-page">

  <!-- Decorative blobs -->
  <div class="blob blob-top"></div>
  <div class="blob blob-bottom"></div>

  <!-- Card -->
  <div class="login-card animate-fade-up">

    <!-- Header -->
    <div class="login-header">
      <a routerLink="/" class="d-inline-block mb-3">
        <img src="assets/images/logo.png" alt="Casita del Sabor" class="login-logo" />
      </a>
      <h1 class="login-title">Portal de Vendedores</h1>
      <p class="login-subtitle">Accede a tu panel de gestión</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()" class="login-form">
      <div class="form-inner">
        @if (errorMessage) {
          <div class="alert alert-danger mb-3">{{ errorMessage }}</div>
        }


        <!-- Email -->
        <div class="form-field">
          <label class="field-label" for="email">Correo electrónico</label>
          <div class="input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              class="field-input"
              formControlName="user"
              placeholder="vendedor@casitadelsabor.com"
              [class.field-error]="isInvalid('user')"
            />
          </div>
          @if (isInvalid('user')) {
            <small class="error-msg">Ingresa un correo electrónico válido</small>
          }
        </div>

        <!-- Password -->
        <div class="form-field">
          <label class="field-label" for="password">Contraseña</label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              class="field-input"
              formControlName="password"
              placeholder="••••••••"
              [class.field-error]="isInvalid('password')"
            />
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
          @if (isInvalid('password')) {
            <small class="error-msg">La contraseña es obligatoria</small>
          }
        </div>

      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn">
        <i class="bi bi-box-arrow-in-right"></i>
        Iniciar Sesión
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <a routerLink="/" class="back-link">← Volver a la tienda</a>
    </div>

  </div>
</div>
