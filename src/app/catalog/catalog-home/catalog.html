<div class="catalog-page">
  <div class="catalog-layout">

    <!-- ── Left Sidebar Filters ────────────────────────────── -->
    <aside class="filter-sidebar">
      <h6 class="filter-heading">Categorías</h6>
      <div class="d-flex flex-column gap-2">
        @for (cat of categories; track cat.key) {
          <button
            class="cat-pill"
            [class.active]="activeCategory === cat.key"
            (click)="activeCategory = cat.key">
            {{ cat.label }}
          </button>
        }
      </div>
    </aside>

    <!-- ── Product Grid ────────────────────────────────────── -->
    <main class="catalog-main py-5 px-4">
      @if (filtered.length === 0) {
        <div class="empty-state">
          <i class="bi bi-box-seam"></i>
          <p>No se encontraron productos.</p>
        </div>
      } @else {
        <div class="product-grid">
          @for (product of filtered; track product.id; let i = $index) {
            <div
              class="product-card"
              [style.animation-delay]="i * 50 + 'ms'"
              (click)="endowmentDetails(product.id)">

              <!-- Image -->
              <div class="product-img-wrap">
                <img
                  [src]="'assets/images/' + product.imagen"
                  [alt]="product.nombre"
                  class="product-img"
                />
                <div class="product-img-overlay">
                  <i class="bi bi-eye"></i>
                </div>
              </div>

              <!-- Body -->
              <div class="product-body">
                <h3 class="product-name">{{ product.nombre }}</h3>
                <p class="product-desc">{{ product.descripcion }}</p>
                <button class="add-to-cart-btn" (click)="endowmentDetails(product.id); $event.stopPropagation()">
                  <i class="bi bi-cart-plus"></i>
                  Agregar al carro
                </button>
              </div>

            </div>
          }
        </div>
      }
    </main>

  </div>
</div>
